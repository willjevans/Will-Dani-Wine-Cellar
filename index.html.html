<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Will & Dani Wine Cellar</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f1ed;color:#2b2320}
.wrap{max-width:1100px;margin:auto;padding:24px}
h1{margin:0 0 6px}.sub{color:#766b66;margin-bottom:22px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.card{background:white;border:1px solid #e4dcd6;border-radius:14px;padding:16px}
.label{font-size:13px;color:#7d716b}.value{font-size:28px;font-weight:700;margin-top:6px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
input,select{padding:10px 12px;border:1px solid #ddd3cc;border-radius:10px;background:white}
input{flex:1;min-width:220px}
.chart{margin-bottom:18px}
.bar-row{display:grid;grid-template-columns:130px 1fr 40px;gap:10px;align-items:center;margin:9px 0}
.track{height:10px;background:#eee7e2;border-radius:99px;overflow:hidden}
.bar{height:100%;background:#7b2334;border-radius:99px}
.table-wrap{overflow:auto;background:white;border:1px solid #e4dcd6;border-radius:14px}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{padding:11px 12px;border-bottom:1px solid #eee6e1;text-align:left;font-size:14px}
th{background:#faf7f4;color:#746963}
.badge{padding:4px 8px;border-radius:999px;background:#f0e5e8;color:#7b2334;font-size:12px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.wrap{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Will's Wine Cellar</h1>
<div class="sub">Simple dashboard and searchable inventory</div>

<div class="stats">
<div class="card"><div class="label">Total bottles</div><div class="value" id="total"></div></div>
<div class="card"><div class="label">Unique wines</div><div class="value" id="unique"></div></div>
<div class="card"><div class="label">Cellaring</div><div class="value" id="cellar"></div></div>
<div class="card"><div class="label">Regions</div><div class="value" id="regions"></div></div>
</div>

<div class="card chart">
<h3>Top grapes</h3>
<div id="grapes"></div>
</div>

<div class="controls">
<input id="search" placeholder="Search producer, wine, region or grape">
<select id="style"><option value="">All styles</option></select>
<select id="region"><option value="">All regions</option></select>
</div>

<div class="table-wrap">
<table>
<thead><tr><th>Qty</th><th>Producer</th><th>Wine</th><th>Vintage</th><th>Country</th><th>Region</th><th>Grape</th><th>Style</th><th>Cellar?</th><th>Drink from</th></tr></thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

<script>
const wines=[{"Quantity": 1, "Producer": "Yangarra", "Wine": "Old Vine Grenache", "Vintage": "2024", "Country": "Australia", "Region": "McLaren Vale", "Grape": "Grenache", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Domaine William Fevre", "Wine": "Chablis Premier Cru Beauroy", "Vintage": "2021", "Country": "France", "Region": "Burgundy", "Grape": "Chablis", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Penfolds", "Wine": "Bin 28 Kalimna Shiraz", "Vintage": "2018", "Country": "Australia", "Region": "South Australia", "Grape": "Shiraz", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Clarendon Hills", "Wine": "Onkaparinga Grenache", "Vintage": "2013", "Country": "Australia", "Region": "McLaren Vale", "Grape": "Grenache", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Terre a Terre", "Wine": "Crayeres Vineyard Cabernet Franc", "Vintage": "2023", "Country": "Australia", "Region": "Adelaide Hills", "Grape": "Cabernet Franc", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Chateau de Javernand", "Wine": "Chiroubles Vieilles Vignes", "Vintage": "2022", "Country": "France", "Region": "Beaujolais", "Grape": "Gamay", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "DAOSA", "Wine": "Rose Sparkling", "Vintage": "NV", "Country": "Australia", "Region": "Adelaide Hills", "Grape": "Blend", "Style": "Sparkling", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Mayfield", "Wine": "Sparkling Cuvee", "Vintage": "NV", "Country": "Australia", "Region": "Orange", "Grape": "Chardonnay", "Style": "Sparkling", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 3, "Producer": "Huntington Estate", "Wine": "Gewurztraminer", "Vintage": "2026", "Country": "Australia", "Region": "Mudgee", "Grape": "Gewurztraminer", "Style": "White", "Cellar": "Y", "DrinkFrom": "2029"}, {"Quantity": 2, "Producer": "Huntington Estate", "Wine": "Bin 17 Shiraz", "Vintage": "2018", "Country": "Australia", "Region": "Mudgee", "Grape": "Shiraz", "Style": "Red", "Cellar": "Y", "DrinkFrom": "2035"}, {"Quantity": 1, "Producer": "Lowe", "Wine": "Zinfandel", "Vintage": "2022", "Country": "Australia", "Region": "Mudgee", "Grape": "Zinfandel", "Style": "Red", "Cellar": "Y", "DrinkFrom": "2030"}, {"Quantity": 1, "Producer": "Lowe", "Wine": "Chardonnay", "Vintage": "2024", "Country": "Australia", "Region": "Mudgee", "Grape": "Chardonnay", "Style": "White", "Cellar": "Y", "DrinkFrom": "2029"}, {"Quantity": 1, "Producer": "Lowe", "Wine": "Amphora Shiraz", "Vintage": "2024", "Country": "Australia", "Region": "Mudgee", "Grape": "Shiraz", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "First Ridge", "Wine": "Barbera", "Vintage": "2023", "Country": "Australia", "Region": "Mudgee", "Grape": "Barbera", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "First Ridge", "Wine": "Fiano", "Vintage": "2025", "Country": "Australia", "Region": "Mudgee", "Grape": "Fiano", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "First Ridge", "Wine": "La Dolce Vita Vermentino", "Vintage": "2025", "Country": "Australia", "Region": "Mudgee", "Grape": "Vermentino", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Cono Sur", "Wine": "Single Vineyard Block 23 Riesling", "Vintage": "2016", "Country": "Chile", "Region": "Valle del Bio-Bio", "Grape": "Riesling", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Gilbert", "Wine": "Shiraz", "Vintage": "2017", "Country": "Australia", "Region": "Mudgee", "Grape": "Shiraz", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Dandelion Vineyards", "Wine": "Shiraz", "Vintage": "2023", "Country": "Australia", "Region": "Barossa", "Grape": "Shiraz", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Huntington Estate", "Wine": "Grenache", "Vintage": "2024", "Country": "Australia", "Region": "Mudgee", "Grape": "Grenache", "Style": "Red", "Cellar": "Y", "DrinkFrom": "2034"}, {"Quantity": 1, "Producer": "Artemis", "Wine": "Pinot Grigio", "Vintage": "2025", "Country": "Australia", "Region": "Southern Highlands", "Grape": "Pinot Grigio", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 2, "Producer": "Small Victories", "Wine": "Blended Fields", "Vintage": "2024", "Country": "Australia", "Region": "Barossa", "Grape": "Blend", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 5, "Producer": "Small Victories", "Wine": "Eden Valley Shiraz", "Vintage": "2023", "Country": "Australia", "Region": "Eden Valley", "Grape": "Shiraz", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 4, "Producer": "Small Victories", "Wine": "Sangiovese", "Vintage": "2024", "Country": "Australia", "Region": "Adelaide Hills", "Grape": "Sangiovese", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 2, "Producer": "Terre a Terre", "Wine": "Adelaide Hills Rose", "Vintage": "2024", "Country": "Australia", "Region": "Adelaide Hills", "Grape": "Rose", "Style": "Rose", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Huntington Estate", "Wine": "Cabernet Sauvignon", "Vintage": "2016", "Country": "Australia", "Region": "Mudgee", "Grape": "Cabernet Sauvignon", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Yangarra", "Wine": "Field Blend", "Vintage": "2024", "Country": "Australia", "Region": "McLaren Vale", "Grape": "Grenache", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "Yangarra", "Wine": "Grenache Blanc", "Vintage": "2025", "Country": "Australia", "Region": "McLaren Vale", "Grape": "Grenache", "Style": "White", "Cellar": "N", "DrinkFrom": ""}, {"Quantity": 1, "Producer": "St Hugo", "Wine": "Cabernet Sauvignon", "Vintage": "2022", "Country": "Australia", "Region": "Barossa", "Grape": "Cabernet Sauvignon", "Style": "Red", "Cellar": "N", "DrinkFrom": ""}];
const sum=a=>a.reduce((s,w)=>s+w.Quantity,0);
const uniq=a=>[...new Set(a)];
const group=(a,k)=>a.reduce((o,w)=>(o[w[k]]=(o[w[k]]||0)+w.Quantity,o),{});

function setup(){
  uniq(wines.map(w=>w.Style)).sort().forEach(x=>style.add(new Option(x,x)));
  uniq(wines.map(w=>w.Region)).sort().forEach(x=>region.add(new Option(x,x)));
}
function filtered(){
  const q=search.value.toLowerCase();
  return wines.filter(w=>
    (!style.value||w.Style===style.value)&&
    (!region.value||w.Region===region.value)&&
    (!q||[w.Producer,w.Wine,w.Region,w.Grape,w.Country].join(" ").toLowerCase().includes(q))
  );
}
function render(){
  const a=filtered();
  total.textContent=sum(a);
  unique.textContent=a.length;
  cellar.textContent=sum(a.filter(w=>w.Cellar==="Y"));
  regions.textContent=uniq(a.map(w=>w.Region)).length;

  const g=Object.entries(group(a,"Grape")).sort((x,y)=>y[1]-x[1]).slice(0,7);
  const max=Math.max(1,...g.map(x=>x[1]));
  grapes.innerHTML=g.map(([k,v])=>`<div class="bar-row"><div>${k}</div><div class="track"><div class="bar" style="width:${v/max*100}%"></div></div><div>${v}</div></div>`).join("");

  body.innerHTML=a.map(w=>`<tr>
  <td><b>${w.Quantity}</b></td><td>${w.Producer}</td><td>${w.Wine}</td><td>${w.Vintage}</td>
  <td>${w.Country}</td><td>${w.Region}</td><td>${w.Grape}</td>
  <td><span class="badge">${w.Style}</span></td><td>${w.Cellar}</td><td>${w.DrinkFrom||"—"}</td>
  </tr>`).join("");
}
setup();
[search,style,region].forEach(x=>x.addEventListener("input",render));
render();
</script>
</body>
</html>
